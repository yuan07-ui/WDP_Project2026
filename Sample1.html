<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS boxed model</title>

        <style>
            .box {
                width: 200px;
                height: 100px;
                background-color: lightblue;
                border: 5px solid blue;
                padding: 20px;
                margin: 10px;
            }

            .box1 {
               width: 250px;
               height: 150px;
               background-color: #29A7D9;
               color: #ffffff;
               padding: 20px;
               border: 5px solid #0A5DA6;
                margin: 20px auto;
               text-align: center;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.2);
            }
        </style>
    </head>
    <body>
        <header class="box">
            This is a box model example.
        </header> 
        <header class="box1">
            This is a box model example but with style sis.
        </header>    
    </body>
</html>
